<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Operation</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./assets/css/stylesheet.css">
  <link rel="stylesheet" href="./assets/css/form.css">
  <link rel="stylesheet" href="./assets/css/table.css">

</head>
<body>

  <header>
    <h1 class="logo">CRUD Operations</h1>

    <div class="buttons">
      <button class="btn" id="addBtn">Add New Student</button>
      <button class="btn" id="delBtn">Delete all Data</button>

      <button class="toastBtn">show notification</button>

    </div>
  </header>



  <!-- Student Form -->
  <form id="studentForm" class="form">

    <h2 class="form-title">Add New Student</h2>

    <div class="input-group">

      <!-- Name -->
      <input type="text" name="name" placeholder="Enter Name" autocomplete="off">
      <span id="nameErr" class="err"></span>

      <!-- Age -->
      <input type="text" name="age" placeholder="Enter Age" autocomplete="off">
      <span id="ageErr" class="err"></span>

      <!-- Gender -->
      <div class="gender">   
        <input type="radio" name="gender" id="male" value="M">
        <label for="male">Male</label>
    
        <input type="radio" name="gender" id="female" value="F">
        <label for="female">Female</label>
      </div>
      <span id="genderErr" class="err"></span>

      <!-- Email -->
      <input type="email" name="email" placeholder="Enter E-mail" autocomplete="off">
      <span id="emailErr" class="err"></span>

      <!-- Course -->
      <select name="course">
        <option value="#" selected>--Select--</option>  <!-- Default -->
      </select>
      <span id="courseErr" class="err"></span>

    </div>

    <!-- Submit Button -->
    <div class="buttons">
      <button type="submit" class="btn submit-btn" id="submitBtn" name="submit">Add Student</button>
      <button type="button" class="btn submit-btn" id="clearBtn">Clear</button>
    </div>

    <span class="close">&times;</span>
  </form>





  <!-- Table for Rendering -->
  <table id="table">
    <thead>
      <tr>
        <th>Sl No.</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>E-mail</th>
        <th>Course</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody></tbody>

  </table>


  
  <!-- Js -->
  <script type="module" src="./assets/js/main.js"></script>

</body>
</html>
